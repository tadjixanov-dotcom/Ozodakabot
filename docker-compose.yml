services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # SQLite faylini volume ichida saqlaymiz — konteyner qayta yaratilsa ham ma'lumot yo'qolmaydi
      DATABASE_URL: sqlite+aiosqlite:////app/data/news_bot.db
    volumes:
      - ./data:/app/data

